name: Build Beta

on:
  push:
    branches:
      - beta

jobs:
  Android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Setup Env
        uses: ./.github/actions/setup

      - name: Build Packages
        env:
          DISABLE_SVG: 1
        shell: bash
        run: |
          set -euo pipefail
          cd android
          echo ${{ secrets.KEYSTORE_STORE_FILE_BASE64 }} | base64 --decode > app/${{ secrets.KEYSTORE_STORE_FILE }}
          ./gradlew assembleStandardRelease assembleVivoRelease -PMYAPP_UPLOAD_STORE_FILE='${{ secrets.KEYSTORE_STORE_FILE }}' -PMYAPP_UPLOAD_KEY_ALIAS='${{ secrets.KEYSTORE_KEY_ALIAS }}' -PMYAPP_UPLOAD_STORE_PASSWORD='${{ secrets.KEYSTORE_PASSWORD }}' -PMYAPP_UPLOAD_KEY_PASSWORD='${{ secrets.KEYSTORE_KEY_PASSWORD }}'
          rm -f app/${{ secrets.KEYSTORE_STORE_FILE }}

      - name: Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: Generate file MD5
        run: |
          find android/app/build/outputs/apk -type f -name "*.apk" -exec md5sum {} \;

      - name: Upload Artifact
        uses: ./.github/actions/upload-artifact
        env:
          PACKAGE_VERSION: ${{ env.PACKAGE_VERSION }}

  Release:
    name: Release
    runs-on: ubuntu-latest
    needs: [Android]
    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Get package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> $GITHUB_ENV

      - name: Release (prerelease)
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          draft: false
          tag_name: v${{ env.PACKAGE_VERSION }}-beta
          name: "Beta v${{ env.PACKAGE_VERSION }}"
          body: |
            > ⚠️ 这是预发布测试版本，可能存在未修复的问题，请谨慎用于生产环境。

            **构建分支：** `beta`
            **提交：** ${{ github.sha }}
          files: |
            artifacts/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-arm64-v8a.apk
            artifacts/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-armeabi-v7a.apk
            artifacts/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-x86_64.apk
            artifacts/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-x86.apk
            artifacts/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-universal.apk
            artifacts/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-arm64-v8a.apk
            artifacts/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-armeabi-v7a.apk
            artifacts/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-x86_64.apk
            artifacts/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-x86.apk
            artifacts/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
