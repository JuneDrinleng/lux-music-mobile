name: Setup
description: Setup Env

runs:
  using: composite
  steps:
    - name: Upload Standard Artifact arm64-v8a
      uses: actions/upload-artifact@v4
      with:
        name: standard-app-v${{ env.PACKAGE_VERSION }}-arm64-v8a-release
        path: android/app/build/outputs/apk/standard/release/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-arm64-v8a.apk

    - name: Upload Standard Artifact armeabi-v7a
      uses: actions/upload-artifact@v4
      with:
        name: standard-app-v${{ env.PACKAGE_VERSION }}-armeabi-v7a-release
        path: android/app/build/outputs/apk/standard/release/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-armeabi-v7a.apk

    - name: Upload Standard Artifact universal
      uses: actions/upload-artifact@v4
      with:
        name: standard-app-v${{ env.PACKAGE_VERSION }}-universal-release
        path: android/app/build/outputs/apk/standard/release/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-universal.apk

    - name: Upload Standard Artifact x86_64
      uses: actions/upload-artifact@v4
      with:
        name: standard-app-v${{ env.PACKAGE_VERSION }}-x86_64-release
        path: android/app/build/outputs/apk/standard/release/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-x86_64.apk

    - name: Upload Standard Artifact x86
      uses: actions/upload-artifact@v4
      with:
        name: standard-app-v${{ env.PACKAGE_VERSION }}-x86-release
        path: android/app/build/outputs/apk/standard/release/lux-music-mobile-v${{ env.PACKAGE_VERSION }}-x86.apk

    - name: Upload Vivo Artifact arm64-v8a
      uses: actions/upload-artifact@v4
      with:
        name: vivo-app-v${{ env.PACKAGE_VERSION }}-arm64-v8a-release
        path: android/app/build/outputs/apk/vivo/release/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-arm64-v8a.apk

    - name: Upload Vivo Artifact armeabi-v7a
      uses: actions/upload-artifact@v4
      with:
        name: vivo-app-v${{ env.PACKAGE_VERSION }}-armeabi-v7a-release
        path: android/app/build/outputs/apk/vivo/release/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-armeabi-v7a.apk

    - name: Upload Vivo Artifact universal
      uses: actions/upload-artifact@v4
      with:
        name: vivo-app-v${{ env.PACKAGE_VERSION }}-universal-release
        path: android/app/build/outputs/apk/vivo/release/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-universal.apk

    - name: Upload Vivo Artifact x86_64
      uses: actions/upload-artifact@v4
      with:
        name: vivo-app-v${{ env.PACKAGE_VERSION }}-x86_64-release
        path: android/app/build/outputs/apk/vivo/release/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-x86_64.apk

    - name: Upload Vivo Artifact x86
      uses: actions/upload-artifact@v4
      with:
        name: vivo-app-v${{ env.PACKAGE_VERSION }}-x86-release
        path: android/app/build/outputs/apk/vivo/release/lux-music-mobile-vivo-v${{ env.PACKAGE_VERSION }}-x86.apk
